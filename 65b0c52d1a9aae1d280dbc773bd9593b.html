<script>
(function(){
  var msg=document.getElementById('msg');
  function fail(t){ msg.innerHTML='<div>'+t+'</div>'; }
  function hexToBytes(h){ var a=new Uint8Array(h.length/2); for(var i=0;i<a.length;i++){ a[i]=parseInt(h.substr(i*2,2),16); } return a; }
  function b64ToBytes(b){ var s=atob(b), a=new Uint8Array(s.length); for(var i=0;i<s.length;i++){ a[i]=s.charCodeAt(i); } return a; }
  var keyHex=(location.hash||'').replace(/^#/,'').trim();
  if(!/^[0-9a-fA-F]{64}$/.test(keyHex)){ fail('Brak prawidłowego klucza w linku. Otwórz pełny link — z częścią po <code>#</code>.'); return; }
  if(!window.crypto||!crypto.subtle){ fail('Ta przeglądarka nie wspiera Web Crypto.'); return; }
  var p; try{ p=JSON.parse(document.getElementById('payload').textContent); }catch(e){ fail('Uszkodzony ładunek.'); return; }
  crypto.subtle.importKey('raw',hexToBytes(keyHex),{name:'AES-CBC'},false,['decrypt'])
    .then(function(k){ return crypto.subtle.decrypt({name:'AES-CBC',iv:hexToBytes(p.iv)},k,b64ToBytes(p.ct)); })
    .then(function(buf){
      var text=new TextDecoder().decode(new Uint8Array(buf)), SENT='HTMLENCv1\n';

      f.setAttribute('title','artefakt');
      f.style.cssText='position:fixed;inset:0;width:100%;height:100%;border:0;margin:0;background:#fff';
      f.srcdoc=text;
      document.body.innerHTML=''; document.body.style.margin='0';
      document.body.appendChild(f);
    })
